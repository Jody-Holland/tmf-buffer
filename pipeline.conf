# Directories and data sources
# INPUT_DIR: root location where project input GeoJSON files are stored.
# Example: "${HOME}/projects"
INPUT_DIR="/maps/mwd24/tmf-data/projects"

# OUTPUT_DIR: top-level folder where all pipeline outputs for projects are written.
# Example: "/scratch/jh2589/gola_area" -> project outputs go under ${OUTPUT_DIR}/${PROJECT_ID}/
OUTPUT_DIR="/scratch/jh2589/gola_area"

# JRC_DIR: directory containing JRC annual change rasters (accumulation) at JRC tiling/resolution.
JRC_DIR="/scratch/jh2589/jrc_2024/acc"

# FCC_DIR: directory containing coarsened proportional coverage (FCC) rasters used as covariates.
FCC_DIR="/scratch/jh2589/jrc_2024/fcc"

# ECOR_GEOJSON: GeoJSON file with ecoregion polygons used for matching and masks.
ECOR_GEOJSON="/maps/4C/ecoregions/ecoregions.geojson"

# ECOR_DIR: directory containing ecoregion raster tiles (if applicable).
ECOR_DIR="/maps/4C/ecoregions"

# ELEV_DIR / SLOPE_DIR: directories with elevation (SRTM) and slope tiles (rescaled to JRC resolution).
ELEV_DIR="/maps/4C/elevation"
SLOPE_DIR="/maps/4C/slopes"

# ACCESS_DIR: directory with accessibility metric (e.g., travel time) rasters used as covariates.
ACCESS_DIR="/maps/4C/access"

# COUNTRIES_RASTER: path to raster (or vector) of country IDs used to constrain matching.
COUNTRIES_RASTER="/maps/4C/osm_boundaries.geojson"

# OTHER_PROJECTS_DIR: folder containing other project footprints used to exclude overlap in matching-area generation.
OTHER_PROJECTS_DIR="/maps/mwd24/tmf-data/projects"

# SRTM_ZIP_DIR / SRTM_TIF_DIR: SRTM raw zips and extracted TIFs folder locations used to generate slope/elevation.
SRTM_ZIP_DIR="/scratch/jh2589/pipeout/srtm/zip"
SRTM_TIF_DIR="/scratch/jh2589/pipeout/srtm/tif"

# -----------------------------
# Sampling and pipeline tunables
# -----------------------------
# BUFFER_METERS: how far (meters) to expand the project footprint when generating the leakage buffer.
# - Units: meters
BUFFER_METERS="10000"

# K_NUM_TO_KEEP: how many top-K Parquet files to retain from `calculate_k` step.
# - Controls disk usage vs. match quality; higher keeps more variation.
# - Default: 256
K_NUM_TO_KEEP="32"

# PROCESSES: default number of worker processes/threads to use for CPU-bound steps (can be overridden per-step).
# - Default: 32
PROCESSES="64"

# BATCH_SIZE: number of K parquet files processed per batch by the matching routine.
# - Default: 32
BATCH_SIZE="64"
